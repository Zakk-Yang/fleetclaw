<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetClaw Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149; --purple: #bc8cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .tag { font-size: 12px; background: var(--border); padding: 2px 8px; border-radius: 12px; color: var(--muted); }
  .header .refresh-btn { margin-left: auto; background: var(--border); border: none; color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .header .refresh-btn:hover { background: var(--accent); color: #000; }

  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .grid-full { grid-column: 1 / -1; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .card-header h2 { font-size: 14px; font-weight: 600; }
  .card-body { padding: 16px; }
  .card-body pre { font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; color: var(--muted); max-height: 400px; overflow-y: auto; }

  .kpi-row { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; min-width: 180px; flex: 1; }
  .kpi .label { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.5px; }
  .kpi .value { font-size: 22px; font-weight: 600; }
  .kpi .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .status-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .status-working { background: #1a3a1a; color: var(--green); }
  .status-blocked { background: #3a1a1a; color: var(--red); }
  .status-done { background: #1a2a3a; color: var(--accent); }
  .status-ready-for-review { background: #2a2a1a; color: var(--yellow); }
  .status-unknown { background: var(--border); color: var(--muted); }

  .agent-card { margin-bottom: 12px; }
  .agent-header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .agent-header h3 { font-size: 15px; }
  .agent-meta { font-size: 12px; color: var(--muted); margin-top: 6px; }

  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin: 12px 0 0 0; }
  .tab { padding: 8px 16px; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted); background: none; border-top: none; border-left: none; border-right: none; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; padding: 12px 0; }
  .tab-content.active { display: block; }

  .field-row { display: flex; gap: 8px; margin-bottom: 4px; font-size: 13px; }
  .field-label { color: var(--muted); min-width: 140px; }
  .field-value { color: var(--text); }

  .auto-refresh { font-size: 11px; color: var(--muted); }

  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="header">
  <h1>FleetClaw</h1>
  <span class="tag" id="project-name">loading...</span>
  <span class="auto-refresh" id="last-update"></span>
  <button class="refresh-btn" onclick="refresh()">Refresh</button>
</div>

<div class="container">
  <div class="kpi-row" id="kpis"></div>
  <div class="grid" id="main-grid"></div>
</div>

<script>
let projectData = null;
let agentsData = null;

async function fetchAll() {
  const [p, a] = await Promise.all([
    fetch('/api/project').then(r => r.json()),
    fetch('/api/agents').then(r => r.json()),
  ]);
  projectData = p;
  agentsData = a;
  render();
}

function statusClass(state) {
  if (!state) return 'status-unknown';
  const s = state.toLowerCase();
  if (s === 'working') return 'status-working';
  if (s === 'blocked') return 'status-blocked';
  if (s === 'done') return 'status-done';
  if (s.includes('review')) return 'status-ready-for-review';
  return 'status-unknown';
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  document.getElementById('project-name').textContent = projectData.name;
  document.title = `FleetClaw - ${projectData.name}`;
  document.getElementById('last-update').textContent = `Updated ${new Date().toLocaleTimeString()}`;

  // KPIs
  const agents = agentsData.agents || [];
  const working = agents.filter(a => a.statusFields.state === 'working').length;
  const blocked = agents.filter(a => a.statusFields.state === 'blocked').length;

  document.getElementById('kpis').innerHTML = `
    <div class="kpi">
      <div class="label">Agents</div>
      <div class="value">${agents.length}</div>
      <div class="sub">${working} working, ${blocked} blocked</div>
    </div>
    <div class="kpi">
      <div class="label">Supervisor</div>
      <div class="value">Every ${projectData.supervisor.checkInterval}m</div>
      <div class="sub">${projectData.supervisor.model}</div>
    </div>
    <div class="kpi">
      <div class="label">Git Branch</div>
      <div class="value">${esc(projectData.git.branch)}</div>
      <div class="sub">${projectData.git.log.split('\n').length} recent commits</div>
    </div>
    <div class="kpi">
      <div class="label">Gateway</div>
      <div class="value">:${projectData.gateway.port || '?'}</div>
      <div class="sub">${projectData.gateway.openclawUrl ? `<a href="${projectData.gateway.openclawUrl}" target="_blank">Open OpenClaw UI</a>` : 'not configured'}</div>
    </div>
  `;

  const openclawLinks = [
    projectData.gateway.openclawUrl ? `<a href="${projectData.gateway.openclawUrl}" target="_blank">Open OpenClaw UI</a>` : '',
    agentsData.supervisor?.sessionUrl ? `<a href="${agentsData.supervisor.sessionUrl}" target="_blank">Open supervisor chat</a>` : '',
  ].filter(Boolean).join(' | ');

  // Main grid
  let html = '';

  // Gateway card
  html += `
    <div class="card">
      <div class="card-header"><h2>Gateway</h2></div>
      <div class="card-body">
        <div class="field-row"><span class="field-label">Profile</span><span class="field-value">${esc(projectData.profile)}</span></div>
        <div class="field-row"><span class="field-label">Port</span><span class="field-value">${projectData.gateway.port}</span></div>
        <div class="field-row"><span class="field-label">Links</span></div>
        <div class="field-value" style="font-size:13px">${openclawLinks || 'not configured'}</div>
      </div>
    </div>
  `;

  // Git card
  const changedFiles = projectData.git.changedFiles || [];
  let changedHtml = '';
  if (changedFiles.length > 0) {
    changedHtml = '<table style="width:100%;font-size:12px;margin-top:8px;border-collapse:collapse">';
    changedHtml += '<tr style="color:var(--muted);text-align:left"><th style="padding:4px 8px">Modified</th><th style="padding:4px 8px">File</th><th style="padding:4px 8px">Status</th></tr>';
    for (const f of changedFiles) {
      const time = f.mtime ? new Date(f.mtime).toLocaleTimeString() : '-';
      const status = f.untracked ? '<span style="color:var(--green)">new</span>' : '<span style="color:var(--yellow)">modified</span>';
      changedHtml += `<tr style="border-top:1px solid var(--border)"><td style="padding:4px 8px;color:var(--muted);white-space:nowrap">${time}</td><td style="padding:4px 8px;word-break:break-all">${esc(f.file)}</td><td style="padding:4px 8px">${status}</td></tr>`;
    }
    changedHtml += '</table>';
    if (projectData.git.diffSummary) {
      changedHtml += `<div style="margin-top:8px;font-size:12px;color:var(--muted)">${esc(projectData.git.diffSummary)}</div>`;
    }
  }

  html += `
    <div class="card">
      <div class="card-header"><h2>Git</h2></div>
      <div class="card-body">
        <pre>${esc(projectData.git.log)}</pre>
        <br><strong>Unstaged changes (${changedFiles.length}):</strong>
        ${changedFiles.length > 0 ? changedHtml : '<br><span style="font-size:12px;color:var(--green)">Working tree clean</span>'}
      </div>
    </div>
  `;

  // Agent cards
  for (const agent of agents) {
    const state = agent.statusFields.state || 'unknown';
    html += `
      <div class="card grid-full agent-card">
        <div class="card-header">
          <h2>${esc(agent.id)}</h2>
          <span class="status-badge ${statusClass(state)}">${esc(state)}</span>
          ${agent.sessionUrl ? `<a href="${agent.sessionUrl}" target="_blank" style="margin-left:auto;font-size:12px;">Open session</a>` : ''}
        </div>
        <div class="card-body">
          <div class="agent-header">
            <div class="agent-meta">
              Model: ${esc(String(agent.model))} | Focus: ${esc(agent.focusDirs.join(', '))} | Thinking: ${esc(agent.thinking)}
            </div>
          </div>
          <div class="field-row"><span class="field-label">Summary</span><span class="field-value">${esc(agent.statusFields.summary || '-')}</span></div>
          <div class="field-row"><span class="field-label">Next step</span><span class="field-value">${esc(agent.statusFields['next step'] || '-')}</span></div>
          <div class="field-row"><span class="field-label">Blocker</span><span class="field-value">${esc(agent.statusFields.blocker || 'none')}</span></div>
          <div class="field-row"><span class="field-label">Files touched</span><span class="field-value">${esc(agent.statusFields['files touched'] || '-')}</span></div>
          <div class="field-row"><span class="field-label">Tests</span><span class="field-value">${esc(agent.statusFields.tests || '-')}</span></div>
          <div class="field-row"><span class="field-label">Decision needed</span><span class="field-value">${esc(agent.statusFields['needs supervisor decision'] || 'no')}</span></div>
          <div class="field-row"><span class="field-label">Last updated</span><span class="field-value">${esc(agent.statusFields['last updated'] || '-')}</span></div>

          <div class="tabs" data-agent="${esc(agent.id)}">
            <button class="tab active" data-tab="brief">BRIEF</button>
            <button class="tab" data-tab="plan">PLAN</button>
            <button class="tab" data-tab="status-raw">STATUS (raw)</button>
            <button class="tab" data-tab="memory">MEMORY</button>
            <button class="tab" data-tab="soul">SOUL</button>
          </div>
          <div class="tab-content active" data-agent="${esc(agent.id)}" data-tab="brief"><pre>${esc(agent.files.brief || 'No BRIEF.md')}</pre></div>
          <div class="tab-content" data-agent="${esc(agent.id)}" data-tab="plan"><pre>${esc(agent.files.plan || 'No PLAN.md yet')}</pre></div>
          <div class="tab-content" data-agent="${esc(agent.id)}" data-tab="status-raw"><pre>${esc(agent.files.status || 'No STATUS.md')}</pre></div>
          <div class="tab-content" data-agent="${esc(agent.id)}" data-tab="memory"><pre>${esc(agent.files.memory || 'No MEMORY.md')}</pre></div>
          <div class="tab-content" data-agent="${esc(agent.id)}" data-tab="soul"><pre>${esc(agent.files.soul || 'No SOUL.md')}</pre></div>
        </div>
      </div>
    `;
  }

  // Supervisor card
  const sup = agentsData.supervisor;
  html += `
    <div class="card grid-full">
      <div class="card-header">
        <h2>Supervisor</h2>
        ${sup.sessionUrl ? `<a href="${sup.sessionUrl}" target="_blank" style="margin-left:auto;font-size:12px;">Open session</a>` : ''}
      </div>
      <div class="card-body">
        <div class="tabs" data-agent="supervisor">
          <button class="tab active" data-tab="roster">ROSTER</button>
          <button class="tab" data-tab="sup-memory">Latest Memory</button>
          <button class="tab" data-tab="sup-status">STATUS</button>
        </div>
        <div class="tab-content active" data-agent="supervisor" data-tab="roster"><pre>${esc(sup.roster || 'No ROSTER.md')}</pre></div>
        <div class="tab-content" data-agent="supervisor" data-tab="sup-memory"><pre>${esc(sup.latestMemory || 'No memory logs yet')}</pre></div>
        <div class="tab-content" data-agent="supervisor" data-tab="sup-status"><pre>${esc(sup.status || 'No STATUS.md')}</pre></div>
      </div>
    </div>
  `;

  document.getElementById('main-grid').innerHTML = html;

  // Bind tab clicks
  document.querySelectorAll('.tabs').forEach(tabBar => {
    tabBar.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const agent = tabBar.dataset.agent;
        const tabName = tab.dataset.tab;
        tabBar.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll(`.tab-content[data-agent="${agent}"]`).forEach(tc => {
          tc.classList.toggle('active', tc.dataset.tab === tabName);
        });
      });
    });
  });
}

function refresh() { fetchAll(); }

// Auto-refresh every 30 seconds
fetchAll();
setInterval(fetchAll, 10000); // 10 seconds
</script>
</body>
</html>
